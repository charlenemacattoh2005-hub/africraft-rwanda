services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  api:
    build: ./server
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/dellcraft-rwanda
      JWT_SECRET: change-me-in-production
      JWT_EXPIRE: 7d
      CLIENT_URL: http://localhost:8080
    depends_on:
      - mongo

  web:
    build:
      context: ./client
      args:
        VITE_API_URL: http://localhost:5000
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  mongo_data:
