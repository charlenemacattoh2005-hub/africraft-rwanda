services:
  # ── Backend API ────────────────────────────────────────────
  - type: web
    name: dellcraft-api
    runtime: node
    # rootDir is intentionally NOT set — uses repo root.
    # The root package.json scripts proxy to server/:
    #   npm install → installs root deps (concurrently)
    #   npm start   → runs "npm run start --prefix server"
    #              → runs "node src/index.js" inside server/
    buildCommand: npm install && npm install --prefix server
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE
        value: 7d
      - key: CLIENT_URL
        value: https://africraft-rwanda-sable.vercel.app
      - key: CLOUDINARY_CLOUD_NAME
        value: nyd9fgxr
      - key: CLOUDINARY_API_KEY
        value: "633921147819551"
      - key: CLOUDINARY_API_SECRET
        sync: false

  # ── Frontend (static) ──────────────────────────────────────
  - type: web
    name: dellcraft-web
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://dellcraft-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
