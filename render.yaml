services:
  # ─────────────────────────────────────────────────────────
  # BACKEND API — Node/Express
  # ─────────────────────────────────────────────────────────
  - type: web
    name: dellcraft-api
    runtime: node
    # Root directory is intentionally blank (uses repo root).
    # postinstall in root package.json auto-runs:
    #   npm install --prefix server
    # so server/node_modules is populated before startCommand runs.
    buildCommand: npm install
    startCommand: node server/src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false          # Set manually in Render dashboard
      - key: JWT_SECRET
        sync: false          # Set manually in Render dashboard
      - key: JWT_EXPIRE
        value: 7d
      - key: CLIENT_URL
        value: https://africraft-rwanda-sable.vercel.app
      - key: CLOUDINARY_CLOUD_NAME
        value: nyd9fgxr
      - key: CLOUDINARY_API_KEY
        value: "633921147819551"
      - key: CLOUDINARY_API_SECRET
        sync: false          # Set manually in Render dashboard

  # ─────────────────────────────────────────────────────────
  # FRONTEND — Vite/React static site (deployed to Render CDN)
  # This is separate from the Vercel deployment.
  # VITE_API_URL must match the backend service URL above.
  # ─────────────────────────────────────────────────────────
  - type: web
    name: dellcraft-web
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://dellcraft-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
