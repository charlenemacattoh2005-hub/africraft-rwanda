services:
  # ── Backend API ────────────────────────────────────────────
  - type: web
    name: dellcraft-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: node src/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRE
        value: 7d
      - key: CLIENT_URL
        value: https://africraft-rwanda-sable.vercel.app
      - key: CLOUDINARY_CLOUD_NAME
        value: nyd9fgxr
      - key: CLOUDINARY_API_KEY
        value: "633921147819551"
      - key: CLOUDINARY_API_SECRET
        sync: false

  # ── Frontend static site ───────────────────────────────────
  - type: web
    name: dellcraft-web
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://dellcraft-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
